<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SA Parties - Premium Party Supplies & Decorations</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ============================================================
         DESIGN TOKENS
         ============================================================ */
      :root {
        --pink-50: #fff1f8;
        --pink-100: #fbdcee;
        --pink-200: #f5b8dd;
        --pink-300: #ee8cc8;
        --pink-400: #e65aae;
        --pink-500: #e0218a;
        --pink-600: #c81d80;
        --pink-700: #ad0a69;
        --pink-800: #8a0a54;
        --pink-900: #6a0a41;
        --yellow: #ffd93d;
        --yellow-light: #fff8dc;
        --blue: #4fc3f7;
        --ink: #1a0d1e;
        --ink-light: #2a1b2e;
        --ink-soft: #8c7a92;
        --ink-muted: #b8a8be;
        --surface: #ffffff;
        --radius-sm: 10px;
        --radius-md: 14px;
        --radius-lg: 20px;
        --radius-xl: 28px;
        --shadow-sm: 0 2px 8px rgba(173, 10, 105, 0.08);
        --shadow-md: 0 6px 20px -8px rgba(173, 10, 105, 0.18);
        --shadow-lg: 0 14px 40px -12px rgba(173, 10, 105, 0.25);
        --shadow-xl: 0 24px 60px -14px rgba(173, 10, 105, 0.35);
        --gradient-primary: linear-gradient(135deg, var(--pink-500) 0%, var(--pink-700) 100%);
        --gradient-hero: linear-gradient(135deg, var(--pink-500) 0%, #c81d80 50%, var(--pink-700) 100%);
        --gradient-gold: linear-gradient(135deg, var(--yellow) 0%, #f5c500 100%);
        --font-display: 'Poppins', sans-serif;
        --font-body: 'Inter', sans-serif;
        --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * { box-sizing: border-box; }

      body {
        font-family: var(--font-body);
        color: var(--ink-light);
        background: var(--pink-50);
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      h1, h2, h3, h4, h5, h6,
      .brand-text, .section-title, .nav-link {
        font-family: var(--font-display);
      }

      ::selection {
        background: var(--pink-500);
        color: #fff;
      }

      /* ============================================================
         NAVBAR
         ============================================================ */
      .navbar-sa {
        background: rgba(255,255,255,0.92);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        padding: 0.65rem 0;
        box-shadow: 0 1px 0 rgba(173,10,105,0.06), 0 4px 24px -10px rgba(173,10,105,0.10);
        position: sticky;
        top: 0;
        z-index: 1030;
        transition: box-shadow var(--transition);
      }
      .navbar-sa.scrolled {
        box-shadow: 0 4px 30px -10px rgba(173,10,105,0.18);
      }
      .brand-logo-img {
        height: 50px;
        width: 50px;
        object-fit: cover;
        border-radius: 14px;
        box-shadow: 0 4px 16px rgba(224,33,138,0.30);
        transition: transform 0.4s ease, box-shadow 0.4s ease;
        cursor: pointer;
      }
      .brand-logo-img:hover {
        transform: scale(1.05) rotate(-3deg);
        box-shadow: 0 6px 24px rgba(224,33,138,0.40);
      }
      .brand-link {
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.65rem;
        flex-shrink: 0;
        transition: transform var(--transition);
      }
      .brand-link:hover {
        transform: translateY(-1px);
      }
      .brand-text {
        font-weight: 800;
        font-size: 1.5rem;
        letter-spacing: -0.02em;
        line-height: 1.1;
        color: var(--ink-light);
      }
      .brand-text .accent {
        color: var(--pink-500);
        background: var(--gradient-primary);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .brand-tagline {
        font-size: 0.62rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink-soft);
      }

      /* Nav links */
      .nav-links {
        display: flex;
        align-items: center;
        gap: 0.15rem;
      }
      .nav-links a {
        font-family: var(--font-body);
        font-weight: 600;
        font-size: 0.88rem;
        color: var(--ink-light);
        text-decoration: none;
        padding: 0.5rem 0.9rem;
        border-radius: 10px;
        transition: all var(--transition);
        position: relative;
        white-space: nowrap;
      }
      .nav-links a:hover,
      .nav-links a.active {
        background: var(--pink-50);
        color: var(--pink-500);
      }
      .nav-links a::after {
        content: '';
        position: absolute;
        bottom: 2px;
        left: 50%;
        transform: translateX(-50%) scaleX(0);
        width: 60%;
        height: 2.5px;
        border-radius: 4px;
        background: var(--gradient-primary);
        transition: transform var(--transition);
      }
      .nav-links a:hover::after,
      .nav-links a.active::after {
        transform: translateX(-50%) scaleX(1);
      }

      /* Cart icon with badge */
      .cart-icon-btn {
        position: relative;
        background: var(--pink-50);
        border: 1.5px solid var(--pink-100);
        color: var(--pink-500);
        width: 42px;
        height: 42px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all var(--transition);
        font-size: 1.15rem;
        flex-shrink: 0;
      }
      .cart-icon-btn:hover {
        background: var(--pink-500);
        color: #fff;
        border-color: var(--pink-500);
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
      }
      .cart-badge {
        position: absolute;
        top: -6px;
        right: -6px;
        background: var(--pink-500);
        color: #fff;
        font-size: 0.62rem;
        font-weight: 800;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 8px rgba(224,33,138,0.35);
        transition: transform 0.2s ease;
      }
      .cart-badge.bump {
        transform: scale(1.3);
      }

      /* Auth button */
      .btn-auth-nav {
        border: 1.5px solid var(--pink-200);
        color: var(--pink-500);
        background: transparent;
        border-radius: 50px;
        font-weight: 600;
        font-size: 0.82rem;
        padding: 0.45rem 1rem;
        transition: all var(--transition);
        white-space: nowrap;
        cursor: pointer;
        font-family: var(--font-body);
      }
      .btn-auth-nav:hover {
        background: var(--pink-500);
        color: #fff;
        border-color: var(--pink-500);
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
      }
      .btn-auth-nav.logged-in {
        background: var(--pink-50);
        border-color: var(--pink-100);
      }

      /* Admin — hidden from customers normally, tiny icon in mobile menu */
      .btn-admin-micro {
        background: transparent;
        border: none;
        color: var(--ink-muted);
        font-size: 0.72rem;
        padding: 0.25rem;
        border-radius: 6px;
        transition: color var(--transition);
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.2rem;
      }
      .btn-admin-micro:hover {
        color: var(--pink-500);
      }

      /* Search */
      .search-wrap {
        position: relative;
        flex: 1;
        max-width: 320px;
      }
      .search-wrap i {
        position: absolute;
        left: 0.9rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--ink-soft);
        font-size: 0.85rem;
        pointer-events: none;
      }
      .search-wrap input {
        width: 100%;
        padding: 0.5rem 1rem 0.5rem 2.5rem;
        border: 1.5px solid var(--pink-100);
        border-radius: 50px;
        background: var(--pink-50);
        font-size: 0.85rem;
        color: var(--ink-light);
        outline: none;
        transition: border-color var(--transition), box-shadow var(--transition);
        font-family: var(--font-body);
      }
      .search-wrap input:focus {
        border-color: var(--pink-500);
        box-shadow: 0 0 0 3px rgba(224,33,138,0.10);
        background: #fff;
      }

      /* Mobile hamburger */
      .hamburger-sa {
        background: var(--pink-50);
        border: 1.5px solid var(--pink-100);
        color: var(--pink-500);
        width: 40px;
        height: 40px;
        border-radius: 10px;
        display: none;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition: all var(--transition);
      }
      .hamburger-sa:hover {
        background: var(--pink-500);
        color: #fff;
        border-color: var(--pink-500);
      }

      /* ============================================================
         HERO
         ============================================================ */
      .hero-sa {
        position: relative;
        overflow: hidden;
        padding: 4rem 0 4.5rem;
        margin-bottom: 2.5rem;
        background: var(--gradient-hero);
        border-radius: 0 0 var(--radius-xl) var(--radius-xl);
      }
      .hero-sa::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 600px 400px at 20% 80%, rgba(255,217,61,0.12) 0%, transparent 70%),
          radial-gradient(ellipse 400px 500px at 80% 20%, rgba(79,195,247,0.08) 0%, transparent 70%);
        pointer-events: none;
      }

      /* Floating decorations */
      .hero-float {
        position: absolute;
        pointer-events: none;
        opacity: 0.6;
        animation: floatAround 12s ease-in-out infinite;
      }
      .hero-float:nth-child(1) { top: 8%; left: 5%; width: 50px; animation-delay: 0s; }
      .hero-float:nth-child(2) { top: 15%; right: 12%; width: 35px; animation-delay: -3s; opacity: 0.4; }
      .hero-float:nth-child(3) { bottom: 20%; left: 8%; width: 28px; animation-delay: -6s; opacity: 0.3; }
      .hero-float:nth-child(4) { top: 40%; right: 5%; width: 42px; animation-delay: -9s; opacity: 0.5; }
      .hero-float:nth-child(5) { bottom: 10%; right: 25%; width: 22px; animation-delay: -2s; opacity: 0.35; }

      @keyframes floatAround {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        25% { transform: translateY(-18px) rotate(5deg); }
        50% { transform: translateY(-8px) rotate(-3deg); }
        75% { transform: translateY(-22px) rotate(4deg); }
      }

      /* Confetti overlay */
      .hero-confetti {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .hero-confetti span {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 2px;
        animation: confettiFall 10s linear infinite;
      }
      .hero-confetti span:nth-child(1) { left: 10%; top: -10px; background: var(--yellow); animation-delay: 0s; width: 6px; height: 6px; }
      .hero-confetti span:nth-child(2) { left: 25%; top: -10px; background: #fff; animation-delay: -2s; width: 10px; height: 10px; border-radius: 50%; }
      .hero-confetti span:nth-child(3) { left: 45%; top: -10px; background: var(--blue); animation-delay: -4s; width: 7px; height: 7px; }
      .hero-confetti span:nth-child(4) { left: 65%; top: -10px; background: var(--yellow); animation-delay: -6s; width: 9px; height: 9px; border-radius: 50%; }
      .hero-confetti span:nth-child(5) { left: 85%; top: -10px; background: #fff; animation-delay: -8s; width: 6px; height: 6px; }
      .hero-confetti span:nth-child(6) { left: 15%; top: -10px; background: rgba(255,255,255,0.6); animation-delay: -1s; width: 5px; height: 5px; }
      .hero-confetti span:nth-child(7) { left: 55%; top: -10px; background: var(--yellow); animation-delay: -3s; width: 11px; height: 11px; }
      .hero-confetti span:nth-child(8) { left: 75%; top: -10px; background: #fff; animation-delay: -5s; width: 6px; height: 6px; border-radius: 50%; }
      .hero-confetti span:nth-child(9) { left: 35%; top: -10px; background: var(--blue); animation-delay: -7s; width: 8px; height: 8px; }
      .hero-confetti span:nth-child(10) { left: 92%; top: -10px; background: var(--yellow); animation-delay: -9s; width: 7px; height: 7px; }

      @keyframes confettiFall {
        0% { transform: translateY(0) rotate(0deg); opacity: 1; }
        100% { transform: translateY(600px) rotate(720deg); opacity: 0; }
      }

      .hero-eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.25);
        padding: 0.4rem 1rem;
        border-radius: 50px;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: #fff;
        backdrop-filter: blur(6px);
        margin-bottom: 1rem;
      }
      .hero-title {
        font-weight: 900;
        font-size: clamp(2rem, 4.5vw, 3.2rem);
        line-height: 1.12;
        color: #fff;
        margin-bottom: 0.75rem;
      }
      .hero-title .highlight {
        color: var(--yellow);
        position: relative;
        display: inline-block;
      }
      .hero-title .highlight::after {
        content: '';
        position: absolute;
        bottom: 2px;
        left: 0;
        right: 0;
        height: 6px;
        background: rgba(255,217,61,0.3);
        border-radius: 4px;
      }
      .hero-subtitle {
        color: rgba(255,255,255,0.85);
        max-width: 540px;
        font-size: 1.02rem;
        line-height: 1.65;
        margin-bottom: 1.5rem;
      }
      .hero-cta-group {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
      }
      .btn-hero-primary {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: #fff;
        color: var(--pink-500);
        font-weight: 700;
        font-size: 0.95rem;
        padding: 0.85rem 2rem;
        border-radius: 50px;
        border: none;
        font-family: var(--font-display);
        transition: all var(--transition);
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        text-decoration: none;
        cursor: pointer;
      }
      .btn-hero-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 30px rgba(0,0,0,0.20);
        color: var(--pink-700);
      }
      .btn-hero-secondary {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: transparent;
        color: #fff;
        font-weight: 600;
        font-size: 0.9rem;
        padding: 0.8rem 1.6rem;
        border-radius: 50px;
        border: 1.5px solid rgba(255,255,255,0.35);
        font-family: var(--font-body);
        transition: all var(--transition);
        text-decoration: none;
        cursor: pointer;
      }
      .btn-hero-secondary:hover {
        background: rgba(255,255,255,0.12);
        border-color: rgba(255,255,255,0.6);
        transform: translateY(-2px);
      }

      /* ============================================================
         TRUST BADGES
         ============================================================ */
      .trust-bar {
        background: #fff;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm);
        padding: 1.25rem 1.5rem;
        margin-top: -1.5rem;
        margin-bottom: 2.5rem;
        position: relative;
        z-index: 2;
        border: 1px solid var(--pink-100);
      }
      .trust-item {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--ink-light);
        padding: 0.35rem 0;
      }
      .trust-item i {
        font-size: 1.3rem;
        color: var(--pink-500);
      }

      /* ============================================================
         SECTION TITLES
         ============================================================ */
      .section-title {
        font-weight: 800;
        font-size: 1.6rem;
        position: relative;
        padding-bottom: 0.6rem;
        margin-bottom: 0.3rem;
        color: var(--ink-light);
      }
      .section-title::after {
        content: '';
        position: absolute;
        left: 0;
        bottom: 0;
        width: 56px;
        height: 4px;
        border-radius: 4px;
        background: var(--gradient-primary);
      }
      .section-title.text-center::after {
        left: 50%;
        transform: translateX(-50%);
      }
      .section-subtitle {
        color: var(--ink-soft);
        font-size: 0.92rem;
        margin-bottom: 1.75rem;
      }

      /* ============================================================
         CATEGORY CARDS
         ============================================================ */
      .cat-card {
        background: #fff;
        border-radius: var(--radius-lg);
        padding: 1.5rem 1rem;
        text-align: center;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--pink-50);
        transition: all var(--transition);
        cursor: pointer;
        text-decoration: none;
        display: block;
        position: relative;
        overflow: hidden;
      }
      .cat-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: var(--gradient-primary);
        transform: scaleX(0);
        transition: transform var(--transition);
      }
      .cat-card:hover {
        transform: translateY(-6px);
        box-shadow: var(--shadow-lg);
        border-color: var(--pink-100);
      }
      .cat-card:hover::before {
        transform: scaleX(1);
      }
      .cat-card .cat-icon {
        font-size: 2rem;
        color: var(--pink-500);
        margin-bottom: 0.65rem;
        display: block;
      }
      .cat-card h6 {
        font-weight: 700;
        font-size: 0.95rem;
        margin-bottom: 0.15rem;
        color: var(--ink-light);
        font-family: var(--font-display);
      }
      .cat-card .cat-count {
        font-size: 0.78rem;
        color: var(--ink-soft);
      }

      /* ============================================================
         PRODUCT CARDS (Modern)
         ============================================================ */
      .product-card-modern {
        background: #fff;
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--pink-50);
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        opacity: 0;
        animation: fadeInUp 0.55s ease forwards;
        position: relative;
      }
      .product-card-modern:hover {
        transform: translateY(-8px);
        box-shadow: var(--shadow-lg);
        border-color: var(--pink-100);
      }
      .product-card-modern .img-wrap {
        position: relative;
        overflow: hidden;
        background: var(--pink-50);
      }
      .product-card-modern .img-wrap img {
        height: 220px;
        width: 100%;
        object-fit: cover;
        transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        display: block;
      }
      .product-card-modern:hover .img-wrap img {
        transform: scale(1.1);
      }
      .product-card-modern .card-badge {
        position: absolute;
        top: 0.75rem;
        left: 0.75rem;
        background: var(--gradient-primary);
        color: #fff;
        font-size: 0.65rem;
        font-weight: 700;
        padding: 0.25rem 0.65rem;
        border-radius: 50px;
        letter-spacing: 0.04em;
      }
      .product-card-modern .card-body {
        padding: 1rem 1.1rem 1.15rem;
      }
      .product-card-modern .product-name {
        font-weight: 700;
        font-size: 0.95rem;
        color: var(--ink-light);
        margin-bottom: 0.3rem;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        line-height: 1.35;
        min-height: 2.6em;
        font-family: var(--font-display);
      }
      .product-card-modern .product-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.7rem;
      }
      .product-card-modern .price-modern {
        font-weight: 800;
        font-size: 1.15rem;
        color: var(--pink-500);
        font-family: var(--font-display);
      }
      .product-card-modern .stock-modern {
        font-size: 0.68rem;
        font-weight: 600;
        padding: 0.25rem 0.6rem;
        border-radius: 50px;
        background: var(--pink-50);
        color: var(--pink-700);
        border: 1px solid var(--pink-100);
        white-space: nowrap;
      }
      .product-card-modern .stock-modern.low {
        background: #fff8e1;
        color: #946d00;
        border-color: #ffe8a8;
      }
      .product-card-modern .stock-modern.out {
        background: #fbe7ea;
        color: #b3261e;
        border-color: #f6c9cf;
      }
      .product-card-modern .btn-actions {
        display: flex;
        gap: 0.45rem;
      }
      .product-card-modern .btn-actions .btn-add {
        flex: 1;
        background: var(--gradient-primary);
        border: none;
        color: #fff;
        font-weight: 700;
        font-size: 0.82rem;
        padding: 0.6rem 0.4rem;
        border-radius: 10px;
        transition: all var(--transition);
        cursor: pointer;
        font-family: var(--font-body);
      }
      .product-card-modern .btn-actions .btn-add:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
      }
      .product-card-modern .btn-actions .btn-add:disabled {
        background: #e9dfe6;
        color: #ad9ca8;
        cursor: not-allowed;
      }
      .product-card-modern .btn-actions .btn-view {
        width: 40px;
        background: var(--pink-50);
        border: 1px solid var(--pink-100);
        color: var(--pink-500);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.95rem;
        transition: all var(--transition);
        cursor: pointer;
        text-decoration: none;
      }
      .product-card-modern .btn-actions .btn-view:hover {
        background: var(--pink-500);
        color: #fff;
        border-color: var(--pink-500);
        transform: translateY(-2px);
      }

      /* ============================================================
         REVIEW SECTION
         ============================================================ */
      .review-card {
        background: #fff;
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--pink-50);
        transition: all var(--transition);
      }
      .review-card:hover {
        box-shadow: var(--shadow-md);
        transform: translateY(-3px);
      }
      .review-card .stars {
        color: var(--yellow);
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
      }
      .review-card p {
        font-size: 0.88rem;
        color: var(--ink-soft);
        line-height: 1.6;
        margin-bottom: 0.75rem;
      }
      .review-card .reviewer {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .review-card .reviewer .avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--gradient-primary);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 0.85rem;
      }
      .review-card .reviewer strong {
        font-size: 0.85rem;
        color: var(--ink-light);
        font-family: var(--font-display);
      }
      .review-card .reviewer span {
        font-size: 0.72rem;
        color: var(--ink-soft);
      }

      /* ============================================================
         FAQ
         ============================================================ */
      .faq-item {
        background: #fff;
        border-radius: var(--radius-md);
        border: 1px solid var(--pink-50);
        overflow: hidden;
        transition: all var(--transition);
        margin-bottom: 0.6rem;
      }
      .faq-item:hover {
        border-color: var(--pink-100);
      }
      .faq-q {
        padding: 1rem 1.2rem;
        font-weight: 700;
        font-size: 0.92rem;
        color: var(--ink-light);
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: none;
        border: none;
        width: 100%;
        text-align: left;
        font-family: var(--font-display);
        transition: color var(--transition);
      }
      .faq-q:hover { color: var(--pink-500); }
      .faq-q i { transition: transform var(--transition); font-size: 0.8rem; color: var(--ink-soft); }
      .faq-q.open i { transform: rotate(180deg); }
      .faq-a {
        padding: 0 1.2rem 1rem;
        font-size: 0.86rem;
        color: var(--ink-soft);
        line-height: 1.6;
        display: none;
      }

      /* ============================================================
         CHECKOUT (keeping all existing IDs)
         ============================================================ */
      .checkout-card {
        background: #fff;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
        border: 1px solid var(--pink-50);
        position: relative;
        overflow: hidden;
      }
      .checkout-card.is-sticky {
        position: sticky;
        top: 92px;
      }
      .checkout-header {
        background: var(--gradient-primary);
        color: #fff;
        padding: 1.1rem 1.4rem;
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .checkout-header h4 {
        margin: 0;
        font-weight: 700;
        font-size: 1rem;
        font-family: var(--font-display);
      }
      .checkout-summary {
        padding: 1.1rem 1.4rem;
        background: var(--pink-50);
      }
      .checkout-summary .label {
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ink-soft);
      }
      .checkout-summary .item-name {
        font-weight: 700;
        font-size: 1rem;
        color: var(--ink-light);
        margin: 0.15rem 0 0.4rem;
        min-height: 1.5em;
      }
      .checkout-divider {
        position: relative;
        border-top: 2px dashed var(--pink-100);
        margin: 0 1.4rem;
      }
      .checkout-divider::before,
      .checkout-divider::after {
        content: '';
        position: absolute;
        top: -13px;
        width: 26px;
        height: 26px;
        background: var(--pink-50);
        border-radius: 50%;
      }
      .checkout-divider::before { left: -1.4rem; margin-left: -13px; }
      .checkout-divider::after { right: -1.4rem; margin-right: -13px; }
      .checkout-form {
        padding: 1.2rem 1.4rem 1.4rem;
      }
      .form-floating > .form-control,
      .form-floating > textarea.form-control {
        border: 1.5px solid var(--pink-100);
        border-radius: 12px;
        font-size: 0.88rem;
      }
      .form-floating > .form-control:focus {
        border-color: var(--pink-500);
        box-shadow: 0 0 0 0.2rem rgba(224,33,138,0.12);
      }
      .form-floating > label {
        color: var(--ink-soft);
        font-size: 0.85rem;
      }
      .btn-confirm {
        background: var(--gradient-primary);
        border: none;
        border-radius: 12px;
        font-weight: 700;
        padding: 0.85rem;
        letter-spacing: 0.02em;
        transition: all var(--transition);
        font-family: var(--font-display);
        font-size: 0.95rem;
      }
      .btn-confirm:not(:disabled):hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
      }
      .btn-confirm:disabled {
        background: #e9dfe6;
        color: #ad9ca8;
        cursor: not-allowed;
      }
      .cod-note {
        font-size: 0.76rem;
        color: var(--ink-soft);
        display: flex;
        align-items: center;
        gap: 0.4rem;
        margin-top: 0.75rem;
      }

      /* Payment method cards */
      .pay-card {
        border: 2px solid #e5dbe7;
        border-radius: 12px;
        padding: 0.55rem 0.4rem;
        text-align: center;
        background: #f9f9f9;
        transition: all var(--transition);
        cursor: pointer;
      }
      .pay-card.active {
        border-color: var(--pink-500);
        background: var(--pink-50);
      }
      .pay-card i { font-size: 1.2rem; display: block; margin-bottom: 0.15rem; }
      .pay-card span {
        font-size: 0.68rem;
        font-weight: 700;
        line-height: 1.2;
      }

      /* ============================================================
         FOOTER
         ============================================================ */
      .footer-sa {
        background: #fff;
        border-top: 1px solid var(--pink-100);
        padding: 2.5rem 0 1.5rem;
        margin-top: 3.5rem;
      }
      .footer-sa h6 {
        font-weight: 700;
        font-size: 0.85rem;
        margin-bottom: 0.75rem;
        color: var(--ink-light);
        font-family: var(--font-display);
      }
      .footer-sa a {
        color: var(--ink-soft);
        text-decoration: none;
        font-size: 0.85rem;
        display: block;
        padding: 0.2rem 0;
        transition: color var(--transition);
      }
      .footer-sa a:hover { color: var(--pink-500); }
      .footer-sa .social-links a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: var(--pink-50);
        color: var(--pink-500);
        font-size: 1.05rem;
        margin-right: 0.4rem;
        margin-bottom: 0.4rem;
        transition: all var(--transition);
      }
      .footer-sa .social-links a:hover {
        background: var(--pink-500);
        color: #fff;
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
      }
      .footer-bottom {
        border-top: 1px solid var(--pink-50);
        padding-top: 1.25rem;
        margin-top: 1.5rem;
        text-align: center;
        font-size: 0.82rem;
        color: var(--ink-soft);
      }

      /* ============================================================
         LOADING SKELETON
         ============================================================ */
      .skeleton-card {
        border-radius: var(--radius-lg);
        background: #fff;
        overflow: hidden;
        box-shadow: var(--shadow-sm);
      }
      .skeleton-img, .skeleton-line {
        background: linear-gradient(90deg, var(--pink-100) 25%, #fdeef6 37%, var(--pink-100) 63%);
        background-size: 400% 100%;
        animation: shimmer 1.4s ease infinite;
      }
      .skeleton-img { height: 220px; }
      .skeleton-line { height: 13px; border-radius: 6px; margin: 0.85rem 1rem; }
      .skeleton-line.w-60 { width: 60%; }
      .skeleton-line.w-40 { width: 40%; }

      /* ============================================================
         EMPTY STATE
         ============================================================ */
      .empty-state {
        text-align: center;
        padding: 3rem 1.5rem;
        background: #fff;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm);
      }
      .empty-state .icon { font-size: 2.5rem; color: var(--pink-100); margin-bottom: 0.6rem; }
      .empty-state h5 { font-weight: 700; font-family: var(--font-display); }
      .empty-state p { color: var(--ink-soft); margin-bottom: 0; font-size: 0.9rem; }

      /* ============================================================
         TOASTS
         ============================================================ */
      .toast-stack {
        position: fixed;
        top: 88px;
        right: 1rem;
        z-index: 1080;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }
      .toast-card {
        background: #fff;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-lg);
        padding: 0.9rem 1.1rem;
        min-width: 270px;
        max-width: 320px;
        display: flex;
        gap: 0.65rem;
        align-items: flex-start;
        border-left: 5px solid var(--pink-500);
        transform: translateX(130%);
        opacity: 0;
        transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
      }
      .toast-card.show { transform: translateX(0); opacity: 1; }
      .toast-card.error { border-left-color: #b3261e; }
      .toast-card .toast-icon { font-size: 1.3rem; line-height: 1; margin-top: 0.1rem; }
      .toast-card.error .toast-icon { color: #b3261e; }
      .toast-card:not(.error) .toast-icon { color: var(--pink-500); }
      .toast-card .toast-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.08rem; }
      .toast-card .toast-msg { font-size: 0.8rem; color: var(--ink-soft); line-height: 1.35; }

      /* ============================================================
         SIDEBAR (kept from original)
         ============================================================ */
      .sidebar-cat-btn {
        width: 100%;
        text-align: left;
        background: transparent;
        border: none;
        border-radius: 12px;
        padding: 0.65rem 0.85rem;
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--ink-light);
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        margin-bottom: 0.25rem;
      }
      .sidebar-cat-btn:hover {
        background: var(--pink-50);
        color: var(--pink-500);
      }
      .sidebar-cat-btn.active {
        background: var(--pink-50);
        color: var(--pink-500);
        border-left: 3px solid var(--pink-500);
      }
      .sidebar-subcat-btn {
        width: 100%;
        text-align: left;
        background: transparent;
        border: none;
        border-radius: 10px;
        padding: 0.45rem 0.75rem 0.45rem 2rem;
        font-size: 0.82rem;
        font-weight: 500;
        color: var(--ink-soft);
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
      }
      .sidebar-subcat-btn:hover {
        background: var(--pink-50);
        color: var(--pink-500);
      }
      .sidebar-subcat-btn.active {
        background: var(--pink-50);
        color: var(--pink-500);
      }

      /* ============================================================
         AUTH MODAL (kept)
         ============================================================ */
      .auth-modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(42,27,46,0.55);
        z-index: 2000;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(4px);
      }
      .auth-modal-overlay.active { display: flex; }
      .auth-modal-box {
        background: #fff;
        border-radius: 24px;
        width: 100%;
        max-width: 420px;
        margin: 1rem;
        box-shadow: 0 24px 60px -10px rgba(173,10,105,0.35);
        overflow: hidden;
        animation: fadeInUp 0.35s ease;
      }
      .auth-modal-header {
        background: var(--gradient-primary);
        color: #fff;
        padding: 1.5rem 1.75rem 1.25rem;
      }
      .auth-modal-header h4 {
        margin: 0;
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 1.25rem;
      }
      .auth-modal-header p {
        margin: 0.25rem 0 0;
        font-size: 0.85rem;
        opacity: 0.85;
      }
      .auth-modal-body {
        padding: 1.5rem 1.75rem 1.75rem;
      }
      .auth-tab-btns {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.25rem;
        background: var(--pink-50);
        border-radius: 12px;
        padding: 0.3rem;
      }
      .auth-tab-btn {
        flex: 1;
        padding: 0.55rem;
        border: none;
        background: transparent;
        border-radius: 9px;
        font-weight: 600;
        font-size: 0.88rem;
        color: var(--ink-soft);
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: var(--font-body);
      }
      .auth-tab-btn.active {
        background: #fff;
        color: var(--pink-500);
        box-shadow: 0 2px 8px rgba(173,10,105,0.15);
      }
      .auth-form-group { margin-bottom: 1rem; }
      .auth-form-group label {
        display: block;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--ink-soft);
        margin-bottom: 0.35rem;
      }
      .auth-form-group input {
        width: 100%;
        padding: 0.65rem 0.9rem;
        border: 1.5px solid var(--pink-100);
        border-radius: 12px;
        font-size: 0.88rem;
        color: var(--ink-light);
        outline: none;
        transition: border-color 0.2s ease;
        font-family: var(--font-body);
      }
      .auth-form-group input:focus {
        border-color: var(--pink-500);
        box-shadow: 0 0 0 3px rgba(224,33,138,0.1);
      }
      .auth-submit-btn {
        width: 100%;
        padding: 0.85rem;
        background: var(--gradient-primary);
        color: #fff;
        border: none;
        border-radius: 12px;
        font-weight: 700;
        font-size: 0.92rem;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: var(--font-display);
      }
      .auth-submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
      }
      .auth-divider {
        text-align: center;
        color: var(--ink-soft);
        font-size: 0.8rem;
        margin: 1rem 0;
        position: relative;
      }
      .auth-divider::before,
      .auth-divider::after {
        content: '';
        position: absolute;
        top: 50%;
        width: 38%;
        height: 1px;
        background: var(--pink-100);
      }
      .auth-divider::before { left: 0; }
      .auth-divider::after { right: 0; }
      .guest-btn {
        width: 100%;
        padding: 0.78rem;
        background: var(--pink-50);
        color: var(--pink-500);
        border: 1.5px solid var(--pink-100);
        border-radius: 12px;
        font-weight: 700;
        font-size: 0.88rem;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: var(--font-display);
      }
      .guest-btn:hover {
        background: var(--pink-100);
        border-color: var(--pink-500);
      }
      .auth-error-msg {
        background: #fbe7ea;
        color: #b3261e;
        border-radius: 10px;
        padding: 0.6rem 0.9rem;
        font-size: 0.82rem;
        font-weight: 600;
        margin-bottom: 1rem;
        display: none;
      }
      .auth-success-msg {
        background: #e8f5e9;
        color: #2e7d32;
        border-radius: 10px;
        padding: 0.6rem 0.9rem;
        font-size: 0.82rem;
        font-weight: 600;
        margin-bottom: 1rem;
        display: none;
      }
      .verify-section { display: none; }

      /* ============================================================
         ANIMATIONS
         ============================================================ */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes shimmer {
        0% { background-position: 100% 0; }
        100% { background-position: 0 0; }
      }

      .reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: opacity 0.6s ease, transform 0.6s ease;
      }
      .reveal.visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* ============================================================
         RESPONSIVE
         ============================================================ */
      @media (max-width: 991.98px) {
        .nav-links { display: none; }
        .hamburger-sa { display: flex; }
        .search-wrap { max-width: 200px; }
        .checkout-card.is-sticky { position: static; top: auto; }
        .hero-sa { padding: 3rem 0 3.5rem; }
        .trust-bar .trust-item { justify-content: center; }
      }
      @media (max-width: 767.98px) {
        .search-wrap { max-width: 140px; }
        .search-wrap input { font-size: 0.8rem; padding: 0.45rem 0.8rem 0.45rem 2rem; }
        .brand-text { font-size: 1.2rem; }
        .brand-logo-img { height: 42px; width: 42px; }
        .trust-bar { padding: 0.9rem 1rem; }
        .trust-item { font-size: 0.75rem; }
        .section-title { font-size: 1.3rem; }
        .footer-sa { padding: 1.5rem 0 1rem; }
        .btn-auth-nav span { display: none; }
      }
      @media (max-width: 575.98px) {
        .search-wrap { max-width: 100px; }
        .hamburger-sa { width: 36px; height: 36px; }
        .cart-icon-btn { width: 36px; height: 36px; font-size: 1rem; }
        .hero-float { display: none; }
        .hero-sa { padding: 2.5rem 0 3rem; margin-bottom: 1.5rem; }
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>
  <body>
    <!-- ============================================================
    AUTH MODAL
    ============================================================ -->
    <div class="auth-modal-overlay" id="auth-modal-overlay">
      <div class="auth-modal-box">
        <div class="auth-modal-header">
          <h4 id="auth-modal-title">🎈 Welcome to SA Parties!</h4>
          <p id="auth-modal-subtitle">Choose an option: Log in or continue as a guest.</p>
        </div>
        <div class="auth-modal-body">
          <div class="auth-tab-btns" id="auth-tab-btns">
            <button class="auth-tab-btn active" onclick="switchAuthTab('login')">Login</button>
            <button class="auth-tab-btn" onclick="switchAuthTab('signup')">Signup</button>
          </div>
          <div class="auth-error-msg" id="auth-error-msg"></div>
          <div class="auth-success-msg" id="auth-success-msg"></div>

          <!-- LOGIN -->
          <div id="login-form-section">
            <div class="auth-form-group">
              <label>Email</label>
              <input type="email" id="login-email" placeholder="Your@email.com" />
            </div>
            <div class="auth-form-group">
              <label>Password</label>
              <input type="password" id="login-password" placeholder="Password" />
            </div>
            <button class="auth-submit-btn" onclick="handleLogin()">
              <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>
          </div>

          <!-- SIGNUP -->
          <div id="signup-form-section" style="display:none">
            <div class="auth-form-group">
              <label>Name</label>
              <input type="text" id="signup-name" placeholder="Your name" />
            </div>
            <div class="auth-form-group">
              <label>Email</label>
              <input type="email" id="signup-email" placeholder="Your@email.com" />
            </div>
            <div class="auth-form-group">
              <label>Password</label>
              <input type="password" id="signup-password" placeholder="Set your password" />
            </div>
            <button class="auth-submit-btn" onclick="handleSignup()">
              <i class="bi bi-person-plus me-2"></i>Signup
            </button>
          </div>

          <!-- VERIFY -->
          <div class="verify-section" id="verify-section">
            <p style="font-size:0.86rem;color:var(--ink-soft);margin-bottom:1rem;">
              <i class="bi bi-envelope-check" style="color:var(--pink-500);"></i>
              Enter the <strong>6-digit code</strong> sent to your email:
            </p>
            <div class="auth-form-group">
              <label>Verification Code</label>
              <input type="text" id="verify-code-input" placeholder="e.g. 482910" maxlength="6" />
            </div>
            <button class="auth-submit-btn" onclick="handleVerify()">
              <i class="bi bi-shield-check me-2"></i>Verify
            </button>
          </div>

          <!-- GUEST -->
          <div id="guest-section">
            <div class="auth-divider">ya</div>
            <button class="guest-btn" onclick="continueAsGuest()">
              <i class="bi bi-person-walking me-2"></i>Continue as Guest
            </button>
            <p style="text-align:center;font-size:0.74rem;color:var(--ink-soft);margin-top:0.6rem;margin-bottom:0;">
              You can place order without Login
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- ============================================================
    SIDEBAR OVERLAY & DRAWER
    ============================================================ -->
    <div id="sidebar-overlay" onclick="closeSidebar()"
      style="display:none;position:fixed;inset:0;background:rgba(42,27,46,0.45);z-index:1040;backdrop-filter:blur(3px);">
    </div>

    <div id="sidebar-drawer"
      style="position:fixed;top:0;left:-300px;width:280px;height:100%;background:#fff;z-index:1050;
             box-shadow:8px 0 32px rgba(173,10,105,0.18);transition:left 0.32s cubic-bezier(.4,0,.2,1);
             display:flex;flex-direction:column;overflow-y:auto;">
      <div style="background:var(--gradient-primary);padding:1.3rem 1.25rem 1.1rem;display:flex;align-items:center;justify-content:space-between;">
